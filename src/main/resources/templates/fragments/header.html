<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrainTravel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- 네비게이션 -->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/train-travel-text-logo-refined.svg}" src="/images/train-travel-text-logo-refined.svg" alt="TrainTravel" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <!-- 관광기차여행 메가메뉴 -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="megaMenuLink" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            관광기차여행
                        </a>
                        <div class="dropdown-menu mega-menu p-3" aria-labelledby="megaMenuLink" data-bs-auto-close="outside">
                            <div class="d-flex justify-content-center mb-4 country-tabs">
                                <div class="country-tab active" data-country="korea">한국</div>
                                <div class="country-tab" data-country="japan">일본</div>
                            </div>

                            <div class="region-container text-center">
                                <div id="korea-region-list" class="region-row justify-content-center">
                                    <div class="region-item"><a href="/#korea-수도권">수도권</a></div>
                                    <div class="region-item"><a href="/#korea-강원도">강원도</a></div>
                                    <div class="region-item"><a href="/#korea-충청도">충청도</a></div>
                                    <div class="region-item"><a href="/#korea-경상도">경상도</a></div>
                                    <div class="region-item"><a href="/#korea-전라도">전라도</a></div>
                                    <div class="region-item"><a href="/#korea-제주도">제주도</a></div>
                                </div>

                                <div id="japan-region-list" class="region-row justify-content-center d-none">
                                    <div class="region-item"><a href="/#japan-홋카이도">홋카이도</a></div>
                                    <div class="region-item"><a href="/#japan-도호쿠">도호쿠</a></div>
                                    <div class="region-item"><a href="/#japan-호쿠리쿠신에쓰">호쿠리쿠신에쓰</a></div>
                                    <div class="region-item"><a href="/#japan-간토">간토</a></div>
                                    <div class="region-item"><a href="/#japan-도카이">도카이</a></div>
                                    <div class="region-item"><a href="/#japan-간사이">간사이</a></div>
                                    <div class="region-item"><a href="/#japan-주고쿠">주고쿠</a></div>
                                    <div class="region-item"><a href="/#japan-시코쿠">시코쿠</a></div>
                                    <div class="region-item"><a href="/#japan-규슈">규슈</a></div>
                                </div>
                            </div>
                        </div>
                    </li>

                    <li class="nav-item"><a class="nav-link" th:href="@{board/list}" href="/board/list">커뮤니티</a></li>
                    <li class="nav-item"><a class="nav-link" href="#travel-tips">기차여행Tips</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/trains">관리자</a>
                    </li>
                </ul>

                <!-- 로그인/로그아웃 -->
                <div>
                    <div sec:authorize="isAnonymous()">
                        <a href="/auth/login" class="btn btn-outline-primary btn-sm me-2">로그인</a>
                        <a href="/auth/register" class="btn btn-primary btn-sm">회원가입</a>
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <a href="/mypage" class="btn btn-outline-primary btn-sm me-2">마이페이지</a>
                        <form th:action="@{/auth/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">로그아웃</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
