<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head"><title>게시글 상세</title></head>

<body>
<header th:replace="fragments/header :: header"></header>

<div class="container mt-5 pt-5">
  <!-- 알림 메시지 -->
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h3 th:text="${board.title}"></h3>
      <span th:text="|작성자: ${board.writer}|"></span>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <small class="text-muted">
          <span th:text="|작성일: ${#temporals.format(board.createdDate, 'yyyy.MM.dd HH:mm')}|"></span>
          <span th:if="${board.modifiedDate != null}"
                th:text="|(수정일: ${#temporals.format(board.modifiedDate, 'yyyy.MM.dd HH:mm')})|"></span>
        </small>
      </div>
      <div class="card-text mb-4" style="min-height: 300px;" th:utext="${board.content}"></div>

      <div class="d-flex justify-content-between">
        <a th:href="@{/board/list}" class="btn btn-secondary">목록</a>
        <div th:if="${isWriter != null && (isWriter == true || isAdmin == true)}">
          <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn btn-primary me-2">수정</a>
          <a th:href="@{/board/delete/{id}(id=${board.id})}" class="btn btn-danger"
             onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
        </div>
      </div>
    </div>
  </div>
  
  <!--댓글 섹션 -->
  <div class="card mt-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5>댓글 <span class="badge bg-secondary ms-2" th:text="${commentCount}"></span></h5>
    </div>
    
    <!--댓글 목록 -->
    <div class="card-body">
      <div th:if="${comments.isEmpty()}" class="text-center p-3">
        <p class="text-muted">첫 댓글을 남겨보세요</p>
      </div>

      <!-- 루트 댓글 반복 -->
      <div th:each="comment : ${comments}" class="border-bottom pb-3 mb-3" th:if="${comment.depth == 0}">
        <div class="d-flex justify-content-between">
          <div>
            <strong th:text="${comment.writer}"></strong>
            <small class="text-muted ms-2" th:text="${#temporals.format(comment.createdDate, 'yyyy/MM/dd HH:mm')}"></small>
            <span th:if="${comment.replyCount > 0}" class="badge bg-light text-dark ms-2"
                  th:text="'대댓글 ' + ${comment.replyCount} + '개'"></span>
          </div>
          <div>
            <button th:if="${#authentication.isAuthenticated() && !#strings.equals(#authentication.name, 'anonymousUser')}" class="btn btn-sm btn-outline-success reply-btn" th:data-id="${comment.id}">
              <i class="bi bi-chat-dots"></i> 대댓글
            </button>
            <button th:if="${#authentication.isAuthenticated() && (#authentication.name == comment.writer || #authentication.authorities.toString().contains('ROLE_ADMIN'))}" class="btn btn-sm btn-outline-primary comment-edit-btn ms-1"
                    th:attr="data-id=${comment.id},data-content=${comment.content}">수정
            </button>
            <button th:if="${#authentication.isAuthenticated() && (#authentication.name == comment.writer || #authentication.authorities.toString().contains('ROLE_ADMIN'))}" class="btn btn-sm btn-outline-danger ms-1 comment-delete-btn"
                    th:data-id="${comment.id}">삭제
            </button>
          </div>
        </div>
        <p class="mt-2" th:id="'comment-content-' + ${comment.id}" th:text="${comment.content}"></p>

        <!-- 댓글 수정 폼 -->
        <div th:id="'comment-edit-form-' + ${comment.id}" class="d-none">
          <textarea class="form-control mb-2" rows="3" th:text="${comment.content}"></textarea>
          <div class="text-end">
            <button class="btn btn-sm btn-secondary comment-edit-cancel-btn"
                    th:data-id="${comment.id}">취소
            </button>
            <button class="btn btn-sm btn-primary ms-1 comment-edit-save-btn"
                    th:data-id="${comment.id}">저장
            </button>
          </div>
        </div>

        <!-- 대댓글 작성 폼 -->
        <div th:if="${#authentication.isAuthenticated() && !#strings.equals(#authentication.name, 'anonymousUser')}" th:id="'reply-form-' + ${comment.id}" class="reply-form mt-2" style="display: none;">
          <div class="card">
            <div class="card-header bg-light">
              <strong>대댓글 작성</strong>
            </div>
            <div class="card-body">
              <input type="hidden" class="reply-parent-id" th:value="${comment.id}">
              <div class="mb-2">
                <label class="form-label">내용</label>
                <textarea class="form-control reply-content" rows="2" required></textarea>
              </div>
              <div class="text-end">
                <button class="btn btn-sm btn-secondary reply-cancel-btn"
                        th:data-id="${comment.id}">취소</button>
                <button class="btn btn-sm btn-primary ms-1 reply-save-btn"
                        th:data-id="${comment.id}">등록</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 대댓글 표시 영역 -->
        <div th:if="${comment.childComments != null && !comment.childComments.isEmpty()}" class="reply-container mt-3">
          <!-- 대댓글 반복 -->
          <div th:each="reply : ${comment.childComments}" class="border-bottom pb-2 mb-2 ms-4">
            <div class="d-flex justify-content-between">
              <div>
                <i class="bi bi-arrow-return-right text-muted me-2"></i>
                <strong th:text="${reply.writer}"></strong>
                <small class="text-muted ms-2" th:text="${#temporals.format(reply.createdDate, 'yyyy/MM/dd HH:mm')}"></small>
              </div>
              <div>
                <button th:if="${#authentication.isAuthenticated() && !#strings.equals(#authentication.name, 'anonymousUser')}" class="btn btn-sm btn-outline-success reply-to-reply-btn"
                        th:data-parent-id="${comment.id}" th:data-id="${reply.id}">
                  <i class="bi bi-chat-dots"></i> 대댓글
                </button>
                <button th:if="${#authentication.isAuthenticated() && (#authentication.name == reply.writer || #authentication.authorities.toString().contains('ROLE_ADMIN'))}" class="btn btn-sm btn-outline-primary comment-edit-btn ms-1"
                        th:attr="data-id=${reply.id},data-content=${reply.content}">수정
                </button>
                <button th:if="${#authentication.isAuthenticated() && (#authentication.name == reply.writer || #authentication.authorities.toString().contains('ROLE_ADMIN'))}" class="btn btn-sm btn-outline-danger ms-1 comment-delete-btn"
                        th:data-id="${reply.id}">삭제
                </button>
              </div>
            </div>
            <p class="mt-1" th:id="'comment-content-' + ${reply.id}" th:text="${reply.content}"></p>

            <!-- 대댓글 수정 폼 -->
            <div th:id="'comment-edit-form-' + ${reply.id}" class="d-none">
              <textarea class="form-control mb-2" rows="2" th:text="${reply.content}"></textarea>
              <div class="text-end">
                <button class="btn btn-sm btn-secondary comment-edit-cancel-btn"
                        th:data-id="${reply.id}">취소
                </button>
                <button class="btn btn-sm btn-primary ms-1 comment-edit-save-btn"
                        th:data-id="${reply.id}">저장
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!--댓글 작성 폼-->
    <div class="card-footer">
      <form id="commentForm" th:if="${#authentication.isAuthenticated() && !#strings.equals(#authentication.name, 'anonymousUser')}">
        <input type="hidden" id="boardId" th:value="${board.id}">
        <div class="mb-3">
          <label for="commentContent" class="form-label">내용</label>
          <textarea class="form-control" id="commentContent" rows="3" required></textarea>
        </div>
        <div class="text-end">
          <button type="submit" class="btn btn-primary">댓글작성</button>
        </div>
      </form>
      <div th:unless="${#authentication.isAuthenticated() && !#strings.equals(#authentication.name, 'anonymousUser')}" class="alert alert-info text-center">
        <i class="bi bi-info-circle me-2"></i>댓글을 작성하려면 <a th:href="@{/auth/login}" class="alert-link">로그인</a>이 필요합니다.
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer th:replace="fragments/footer :: footer"></footer>

<!-- 스크립트 삽입 -->
<th:block th:replace="fragments/footer :: scripts"></th:block>

<!-- 댓글 관련 스크립트 -->
<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', function () {
    const boardId = parseInt(document.getElementById('boardId').value, 10);

    // 댓글 폼 서밋 이벤트
    const commentForm = document.getElementById('commentForm');
    if (commentForm) {
      commentForm.addEventListener('submit', function (e) {
        e.preventDefault();

        const content = document.getElementById('commentContent').value;

        if (!content.trim()) {
          alert('내용을 입력해주세요.');
          return;
        }

        fetch('/api/comments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            boardId: boardId,
            content: content
          })
        })
          .then(async response => {
            if (response.ok) {
              return response.json();
            }
            const errorText = await response.text();
            console.error('Error response:', errorText);
            throw new Error('댓글 작성 실패: ' + errorText);
          })
          .then(data => {
            // 성공 시 페이지 새로고침
            window.location.reload();
          })
          .catch(error => {
            console.error('Error:', error);
            alert('댓글 작성 중 오류가 발생했습니다.');
          });
      });
    }

    // 대댓글 버튼 클릭 이벤트 (대댓글 폼 표시)
    const replyButtons = document.querySelectorAll('.reply-btn');
    replyButtons.forEach(button => {
      button.addEventListener('click', function() {
        const commentId = this.getAttribute('data-id');
        const replyForm = document.getElementById(`reply-form-${commentId}`);

        // 다른 댓글 및 대댓글 폼 감추기
        document.querySelectorAll('.reply-form').forEach(form => {
          if (form.id !== `reply-form-${commentId}`) {
            form.style.display = 'none';
          }
        });

        // 폼 표시 토글
        if (replyForm.style.display === 'block') {
          replyForm.style.display = 'none';
        } else {
          replyForm.style.display = 'block';
        }
      });
    });

    // 대댓글에 대한 대댓글 버튼 클릭 이벤트
    const replyToReplyButtons = document.querySelectorAll('.reply-to-reply-btn');
    replyToReplyButtons.forEach(button => {
      button.addEventListener('click', function() {
        const parentId = this.getAttribute('data-parent-id');
        const replyId = this.getAttribute('data-id');
        const replyForm = document.getElementById(`reply-form-${parentId}`);

        // 다른 댓글 폼 감추기
        document.querySelectorAll('.reply-form').forEach(form => {
          form.style.display = 'none';
        });

        // 해당 댓글의 대댓글 폼 표시
        replyForm.style.display = 'block';

        // 대댓글의 작성자 정보를 참조하여 내용 자동 채우기
        const replyContent = document.getElementById(`comment-content-${replyId}`).textContent;
        const replyWriter = document.querySelector(`#comment-content-${replyId}`).previousElementSibling.querySelector('strong').textContent;
        replyForm.querySelector('.reply-content').value = `@${replyWriter} `;
        replyForm.querySelector('.reply-content').focus();
      });
    });

    // 대댓글 취소 버튼 이벤트
    const replyCancelButtons = document.querySelectorAll('.reply-cancel-btn');
    replyCancelButtons.forEach(button => {
      button.addEventListener('click', function() {
        const commentId = this.getAttribute('data-id');
        const replyForm = document.getElementById(`reply-form-${commentId}`);
        replyForm.style.display = 'none';

        // 폼 초기화
        replyForm.querySelector('.reply-content').value = '';
      });
    });

    // 대댓글 저장 버튼 이벤트
    const replySaveButtons = document.querySelectorAll('.reply-save-btn');
    replySaveButtons.forEach(button => {
      button.addEventListener('click', function() {
        const commentId = this.getAttribute('data-id');
        const replyForm = document.getElementById(`reply-form-${commentId}`);

        const parentId = replyForm.querySelector('.reply-parent-id').value;
        const content = replyForm.querySelector('.reply-content').value;

        if (!content.trim()) {
          alert('내용을 입력해주세요.');
          return;
        }

        // 대댓글 저장 API 호출
        fetch('/api/comments/reply', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            boardId: boardId,
            parentId: parseInt(parentId, 10),
            content: content
          })
        })
          .then(async response => {
            if (response.ok) {
              return response.json();
            }
            const errorText = await response.text();
            console.error('Error response:', errorText);
            throw new Error('대댓글 작성 실패: ' + errorText);
          })
          .then(data => {
            // 성공 시 페이지 새로고침
            window.location.reload();
          })
          .catch(error => {
            console.error('Error:', error);
            alert('대댓글 작성 중 오류가 발생했습니다.');
          });
      });
    });

    // 댓글 수정 버튼 이벤트
    const editButtons = document.querySelectorAll('.comment-edit-btn');
    editButtons.forEach(button => {
      button.addEventListener('click', function () {
        const commentId = this.getAttribute('data-id');
        const contentElement = document.getElementById(`comment-content-${commentId}`);
        const editFormElement = document.getElementById(`comment-edit-form-${commentId}`);

        // 현재 댓글 숨기고 수정 폼 보이기
        contentElement.classList.add('d-none');
        editFormElement.classList.remove('d-none');
      });
    });

    // 수정 취소 버튼 이벤트
    const cancelEditButtons = document.querySelectorAll('.comment-edit-cancel-btn');
    cancelEditButtons.forEach(button => {
      button.addEventListener('click', function() {
        const commentId = this.getAttribute('data-id');
        const contentElement = document.getElementById(`comment-content-${commentId}`);
        const editFormElement = document.getElementById(`comment-edit-form-${commentId}`);

        // 수정 폼 숨기고 내용 표시
        editFormElement.classList.add('d-none');
        contentElement.classList.remove('d-none');
      });
    });

    // 수정 저장 버튼 이벤트
    const saveButtons = document.querySelectorAll('.comment-edit-save-btn');
    saveButtons.forEach(button => {
      button.addEventListener('click', function () {
        const commentId = this.getAttribute('data-id');
        const editFormElement = document.getElementById(`comment-edit-form-${commentId}`);
        const content = editFormElement.querySelector('textarea').value;

        if (!content.trim()) {
          alert('내용을 입력해주세요.');
          return;
        }

        fetch(`/api/comments/${commentId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            content: content
          })
        })
          .then(async response => {
            if (response.ok) {
              window.location.reload();
            } else {
              const errorText = await response.text();
              console.error('Error response:', errorText);
              throw new Error('댓글 수정 실패: ' + errorText);
            }
          })
          .catch(error => {
            console.error('Error:', error);
            alert('댓글 수정 중 오류가 발생했습니다.');
          });
      });
    });

    // 댓글 삭제 버튼 이벤트
    const deleteButtons = document.querySelectorAll('.comment-delete-btn');
    deleteButtons.forEach(button => {
      button.addEventListener('click', function () {
        const commentId = this.getAttribute('data-id');

        if (confirm('정말 이 댓글을 삭제하시겠습니까?')) {
          fetch(`/api/comments/${commentId}`, {
            method: 'DELETE'
          })
            .then(response => {
              if (response.ok) {
                window.location.reload();
              } else {
                throw new Error('댓글 삭제 실패');
              }
            })
            .catch(error => {
              console.error('Error:', error);
              alert('댓글 삭제 중 오류가 발생했습니다.');
            });
        }
      });
    });
  });
</script>

</body>
</html>
