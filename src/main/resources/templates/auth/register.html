<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: header">
</header>

<!-- 메인 컨텐츠 -->
<main class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card train-card">
                <div class="card-body text-center">
                    <h2 class="mb-4">회원가입</h2>
                    
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/auth/register}" th:object="${user}" method="post" class="text-start">
                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" th:field="*{username}" class="form-control" required/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" th:field="*{password}" class="form-control" required/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">이메일</label>
                            <input type="email" th:field="*{email}" class="form-control" required/>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">가입하기</button>
                        </div>
                    </form>

                    <div class="mt-4">
                        <p>이미 회원이신가요? <a th:href="@{/auth/login}" class="text-primary">로그인</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: footer">
</footer>

<!-- 스크립트 -->
<th:block th:replace="fragments/footer :: scripts">
</th:block>
</body>
</html>
