<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: header">
</header>

<!-- 메인 컨텐츠 -->
<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm" style="border-radius: 15px; overflow: hidden; border: none;">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4" style="font-weight: 600; color: var(--primary);">회원가입</h2>
                    
                    <!-- 오류 메시지 -->
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/auth/register}" method="post">
                        <div class="mb-4">
                            <label for="username" class="form-label">아이디</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control" required>
                            </div>
                            <small class="form-text text-muted">4~20자의 영문, 숫자만 가능합니다</small>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">비밀번호</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                            <small class="form-text text-muted">8자 이상의 문자를 입력하세요</small>
                        </div>
                        
                        <div class="mb-4">
                            <label for="email" class="form-label">이메일</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 mt-4 mb-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-plus me-2"></i>가입하기
                            </button>
                        </div>
                    </form>

                    <div class="text-center">
                        <p>이미 회원이신가요? <a th:href="@{/auth/login}" class="text-primary fw-bold">로그인</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: footer">
</footer>

<!-- 스크립트 -->
<th:block th:replace="fragments/footer :: scripts"></th:block>
</body>
</html>
