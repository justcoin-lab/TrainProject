<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/header :: head">
    <title>마이페이지 - 내가 쓴 글</title>
</head>
<body>
<header th:replace="fragments/header :: header"></header>

<div class="container mt-5 pt-5">
    <div class="row">
        <!-- 사이드바 메뉴 -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title" th:text="${user.nickname != null ? user.nickname : user.username}">사용자명</h5>
                    <p class="card-text text-muted" th:text="${user.email}">이메일</p>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/mypage}" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2 me-2"></i> 대시보드
                    </a>
                    <a th:href="@{/mypage/profile}" class="list-group-item list-group-item-action">
                        <i class="bi bi-person-circle me-2"></i> 프로필 정보
                    </a>
                    <a th:href="@{/mypage/password}" class="list-group-item list-group-item-action">
                        <i class="bi bi-key me-2"></i> 비밀번호 변경
                    </a>
                    <a th:href="@{/mypage/bookmarks}" class="list-group-item list-group-item-action">
                        <i class="bi bi-bookmark-heart me-2"></i> 북마크
                    </a>
                    <a th:href="@{/mypage/posts}" class="list-group-item list-group-item-action active">
                        <i class="bi bi-file-earmark-text me-2"></i> 내가 쓴 글
                    </a>
                </div>
            </div>
        </div>

        <!-- 메인 컨텐츠 -->
        <div class="col-md-9">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>내가 쓴 글</h5>
                    <a th:href="@{/board/write}" class="btn btn-sm btn-light">
                        <i class="bi bi-plus-circle me-1"></i> 새 글 쓰기
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${myPosts.isEmpty()}" class="alert alert-info mb-0">
                        <i class="bi bi-info-circle me-2"></i>작성한 게시글이 없습니다.
                    </div>
                    
                    <div th:unless="${myPosts.isEmpty()}" class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>번호</th>
                                    <th>제목</th>
                                    <th>작성일</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="post : ${myPosts}">
                                    <td th:text="${post.id}">1</td>
                                    <td>
                                        <a th:href="@{/board/{id}(id=${post.id})}" 
                                           th:text="${post.title}" 
                                           class="text-decoration-none text-dark fw-medium">
                                           제목
                                        </a>
                                        <span th:if="${post.commentCount > 0}" 
                                              class="badge bg-secondary ms-1" 
                                              th:text="${post.commentCount}">0</span>
                                    </td>
                                    <td th:text="${#temporals.format(post.createdDate, 'yyyy-MM-dd HH:mm')}">
                                        2023-01-01
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/board/edit/{id}(id=${post.id})}" 
                                               class="btn btn-outline-primary">
                                                <i class="bi bi-pencil-square"></i>
                                            </a>
                                            <a th:href="@{/board/delete/{id}(id=${post.id})}" 
                                               class="btn btn-outline-danger"
                                               onclick="return confirm('정말 삭제하시겠습니까?');">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/footer :: scripts"></th:block>

</body>
</html>
