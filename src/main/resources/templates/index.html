<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrainTravel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<th:block th:replace="fragments/header :: fragment"></th:block>

<section class="hero-banner" style="background-image: url('/images/train-banner.jpg');">
    <div class="container text-center text-white py-5">
        <h1 class="display-4 fw-bold mt-5">관광열차여행</h1>
        <p class="lead mt-3 mb-5">관광 열차로 여행을 떠나보세요</p>
    </div>
</section>

<!-- 한국 지역 기차 목록 -->
<section class="py-5">
    <div class="container">
        <h2 class="text-center mb-5">한국의 이색 기차여행</h2>
        <div th:each="regionData : ${countriesData.get('한국')}">
            <div class="region-section mb-5" th:attr="id=${regionData['region'].name}">
                <h3 class="mb-4" th:text="${regionData['region'].name}">지역명</h3>
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    <div class="col" th:each="train : ${regionData['trains']}">
                        <div class="card h-100 train-card">
                            <img th:src="${train.imageUrl}" class="card-img-top" alt="기차 이미지">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${train.name}">기차 이름</h5>
                                <a th:href="@{/trains/{id}(id=${train.id})}" class="btn btn-primary">더 많은 정보</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- 일본 지역 기차 목록 -->
<section class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center mb-5">일본의 이색 기차여행</h2>
        <div th:each="regionData : ${countriesData.get('일본')}">
            <div class="region-section mb-5" th:attr="id=${regionData['region'].name}">
                <h3 class="mb-4" th:text="${regionData['region'].name}">지역명</h3>
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    <div class="col" th:each="train : ${regionData['trains']}">
                        <div class="card h-100 train-card">
                            <img th:src="${train.imageUrl}" class="card-img-top" alt="기차 이미지">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${train.name}">기차 이름</h5>
                                <a th:href="@{/trains/{id}(id=${train.id})}" class="btn btn-primary">더 많은 정보</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block th:replace="fragments/footer :: fragment"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
