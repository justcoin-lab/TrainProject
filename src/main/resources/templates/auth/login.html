<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
</head>
<body>
<!-- 헤더 -->
<header th:replace="fragments/header :: header">
</header>

<!-- 메인 컨텐츠 -->
<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm" style="border-radius: 15px; overflow: hidden; border: none;">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4" style="font-weight: 600; color: var(--primary);">로그인</h2>
                    
                    <!-- 오류 메시지 -->
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        아이디 또는 비밀번호가 일치하지 않습니다.
                    </div>
                    
                    <!-- 로그아웃 메시지 -->
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        로그아웃되었습니다.
                    </div>

                    <form action="/auth/login" method="post">
                        <div class="mb-4">
                            <label for="username" class="form-label">아이디</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">비밀번호</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                        </div>
                        
                        <!-- CSRF 토큰 -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div class="d-grid gap-2 mt-4 mb-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>로그인
                            </button>
                        </div>
                    </form>

                    <div class="text-center">
                        <p>계정이 없으신가요? <a href="/auth/register" class="text-primary fw-bold">회원가입</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 푸터 -->
<footer th:replace="fragments/footer :: footer">
</footer>

<!-- 스크립트 -->
<th:block th:replace="fragments/footer :: scripts"></th:block>
</body>
</html>
