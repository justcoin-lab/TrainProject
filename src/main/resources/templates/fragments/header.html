<th:block xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
          th:fragment="fragment">
<header class="sticky-top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,
shrink-to-fit=no">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/traintravel_logo.png" alt="이색 기차여행" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">관광기차여행</a>
                        <ul class="dropdown-menu">
                            <li class="dropdown-submenu">
                                <a class="dropdown-item dropdown-toggle" href="#">한국</a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#korea-capital">수도권</a></li>
                                    <li><a class="dropdown-item" href="#korea-gangwon">강원도</a></li>
                                    <li><a class="dropdown-item" href="#korea-chungcheong">충청도</a></li>
                                    <li><a class="dropdown-item" href="#korea-gyeongsang">경상도</a></li>
                                    <li><a class="dropdown-item" href="#korea-jeolla">전라도</a></li>
                                    <li><a class="dropdown-item" href="#korea-jeju">제주도</a></li>
                                </ul>
                            </li>
                            <li class="dropdown-submenu">
                                <a class="dropdown-item dropdown-toggle" href="#">일본</a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#japan-hokkaido">홋카이도</a></li>
                                    <li><a class="dropdown-item" href="#japan-tohoku">도호쿠</a></li>
                                    <li><a class="dropdown-item" href="#japan-hokuriku-shinetsu">호쿠리쿠신에쓰</a></li>
                                    <li><a class="dropdown-item" href="#japan-kanto">간토</a></li>
                                    <li><a class="dropdown-item" href="#japan-tokai">도카이</a></li>
                                    <li><a class="dropdown-item" href="#japan-kansai">간사이</a></li>
                                    <li><a class="dropdown-item" href="#japan-chugoku">주고쿠</a></li>
                                    <li><a class="dropdown-item" href="#japan-shikoku">시고쿠</a></li>
                                    <li><a class="dropdown-item" href="#japan-kyushu">규슈</a></li>
                                </ul>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/community">커뮤니티</a></li>
                    <li class="nav-item"><a class="nav-link" href="/news">최근뉴스</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" href="/admin/trains">관리자</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <div sec:authorize="isAnonymous()">
                        <a href="/auth/login" class="btn btn-outline-primary me-2">로그인</a>
                        <a href="/auth/register" class="btn btn-primary">회원가입</a>
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <a href="/my-page/bookmarks" class="btn btn-outline-primary me-2">마이페이지</a>
                        <form th:action="@{/auth/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger">로그아웃</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
</th:block>
