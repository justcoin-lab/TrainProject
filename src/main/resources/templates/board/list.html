<!DOCTYPE html>
<html lang="en" xml:th="http://www.thymeleaf.org">
<!--header start-->
<head>
  <meta charset="UTF-8">
  <title>게시판</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<!--header end-->
<body>
  <div class="container mt-5">
    <h2>게시판</h2>

    <!--검색폼-->
    <div class="row mb-3">
      <div class="col-md-9">
        <form th:action="@{/board/list}" th:method="get" class="d-flex">
          <select name="searchType" class="form-select me-2" style="width: 120px;">
            <option value="title" th:select="${searchType == 'title'}">제목</option>
            <option value="content" th:select="${searchType == 'content'}">내용</option>
            <option value="writer" th:select="${searchType == 'writer'}">작성자</option>
          </select>
          <input type="text" name="keyword" class="form-control me-2"
                 th:value="${keyword}" placeholder="검색어를 입력하세요">
          <button type="submit" class="btn btn-outline-primary">검색</button>
        </form>
      </div>
    </div>

    <!--게시글 목록-->
    <table class="table table-hover">
      <thead>
      <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="board : ${boardList}">
        <td th:text="${board.id}"></td>
        <td th:text="${board.title}"></td>
        <td th:text="${board.writer}"></td>
        <td th:text="${#temporals.format(board.createdDate, 'yyyy/MM/dd HH:mm')}"></td>
      </tr>
      <tr th:if="${boardList.isEmpty()}">
        <td colspan="4" class="text-center">게시글이 없습니다.</td>
      </tr>
      </tbody>
    </table>

    <!--페이징-->
    <nav aria-label="Page navigation" th:if="${!boardList.isEmpty()}">
      <ul class="pagination justify-content-center">
        <!-- 이전 페이지 -->
        <li class="page-item" th:classappend="${boardList.hasPrevious()} ? 'disabled'">
          <a class="page-link" th:href="@{/board/list(page=${boardList.number -1},
          searchType=${searchType}, keyword=${keyword})}" aria-label="Previous">
            <span aria-hidden="true">&laquo;</span>
          </a>
        </li>
        <!-- 페이지 번호 -->
        <li class="page-item" th:each="page : ${#numbers.sequence(startPage,endPage)}"
        th:classappend="${page == boardList.number +1} ?'active'">
          <a class="page-link" th:href="@{/board/list(page=${page -1},
          searchType=${searchType},keyword=${keyword})}" th:text="${page}">
          </a>
        </li>
        <!-- 다음 페이지 -->
        <li class="page-item" th:classappend="${boardList.hasNext()} ? 'disabled'">
          <a class="page-link" th:href="@{/board/list(page=${boardList.number +1},
          searchType=${searchType}, keyword=${keyword})}" aria-label="Next">
            <span aria-hidden="true">&laquo;</span>
          </a>
        </li>
      </ul>
    </nav>

  </div>

</body>
</html>
