<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"><title>게시글 관리</title></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container mt-5 pt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>게시글 관리</h2>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 대시보드로
        </a>
    </div>
    
    <!-- 검색 기능 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">게시글 검색</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/community/posts}" method="get" class="row g-3">
                <div class="col-md-2">
                    <select name="searchType" class="form-select">
                        <option value="title" th:selected="${searchType == 'title'}">제목</option>
                        <option value="content" th:selected="${searchType == 'content'}">내용</option>
                        <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <input type="text" name="keyword" class="form-control" 
                           th:value="${keyword}" placeholder="검색어를 입력하세요">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">검색</button>
                </div>
                <div class="col-12 mt-2">
                    <a th:href="@{/admin/community/posts}" class="btn btn-outline-secondary">검색 초기화</a>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 게시글 목록 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">게시글 목록</h5>
            <span>총 <span th:text="${boardPage.totalElements}">0</span>개의 게시글</span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>번호</th>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>작성일</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="post : ${boardPage.content}">
                            <td th:text="${post.id}">1</td>
                            <td>
                                <a th:href="@{/admin/community/posts/{id}(id=${post.id})}" 
                                   th:text="${post.title}">게시글 제목</a>
                            </td>
                            <td th:text="${post.writer}">작성자</td>
                            <td th:text="${#temporals.format(post.createdDate, 'yyyy-MM-dd HH:mm')}">작성일</td>
                            <td>
                                <form th:action="@{/admin/community/posts/delete/{id}(id=${post.id})}" 
                                      method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${boardPage.empty}">
                            <td colspan="5" class="text-center">게시글이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 페이징 -->
            <div th:if="${!boardPage.empty}" class="d-flex justify-content-center mt-4">
                <nav aria-label="Page navigation">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${boardPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/community/posts(page=${boardPage.number - 1}, searchType=${searchType}, keyword=${keyword})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, boardPage.totalPages - 1)}" 
                            th:classappend="${i == boardPage.number} ? 'active'">
                            <a class="page-link" th:href="@{/admin/community/posts(page=${i}, searchType=${searchType}, keyword=${keyword})}" 
                               th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${boardPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/community/posts(page=${boardPage.number + 1}, searchType=${searchType}, keyword=${keyword})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- 스크립트 삽입 -->
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
