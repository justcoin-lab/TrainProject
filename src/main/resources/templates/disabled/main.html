<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>이색기차여행 - 메인</title>
</head>
<body>
<div layout:fragment="content">
    <!-- 메인 배너 이미지 -->
    <div class="main-banner mb-5">
        <img src="/images/main-banner.jpg" class="img-fluid w-100" alt="기차여행 배너" style="max-height: 500px; object-fit: cover;">
        <div class="banner-text position-absolute top-50 start-50 translate-middle text-white text-center">
            <h1 class="display-4 fw-bold">특별한 기차여행을 시작하세요</h1>
            <p class="lead">한국과 일본의 아름다운 기차여행 정보를 만나보세요.</p>
        </div>
    </div>

    <!-- 국가 선택 -->
    <div class="country-selector mb-4">
        <h2 class="mb-3">인기 기차여행</h2>
        <div class="btn-group" role="group">
            <button th:each="country : ${countries}"
                    th:id="${'country-' + country.id}"
                    th:class="${country.id == selectedCountryId ? 'btn btn-primary' : 'btn btn-outline-primary'}"
                    th:data-country-id="${country.id}"
                    th:text="${country.name}"
                    onclick="selectCountry(this.getAttribute('data-country-id'))">
                국가명
            </button>
        </div>
    </div>

    <!-- TOP 3 기차여행 -->
    <div class="row" id="top-train-travels">
        <div class="col-md-4 mb-4" th:each="train : ${topTrainTravels}">
            <div class="card h-100">
                <img th:src="${train.thumbnail}" class="card-img-top" alt="기차여행 이미지" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${train.name}">기차여행 이름</h5>
                    <p class="card-text">
                        <small class="text-muted">
                            <span th:text="${train.regionName}">지역명</span>,
                            <span th:text="${train.countryName}">국가명</span>
                        </small>
                    </p>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="text-danger">♥</span>
                            <span th:text="${train.likeCount}">0</span>
                        </div>
                        <a th:href="@{/trainDetail/{id}(id=${train.id})}" class="btn btn-sm btn-outline-primary">자세히 보기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function selectCountry(countryId) {
        fetch(`/api/trainTravels/top3?countryId=${countryId}`)
            .then(response => response.json())
            .then(data => {
                // 버튼 스타일 변경
                document.querySelectorAll('.country-selector .btn').forEach(btn => {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-primary');
                });
                document.querySelector(`[data-country-id="${countryId}"]`).classList.remove('btn-outline-primary');
                document.querySelector(`[data-country-id="${countryId}"]`).classList.add('btn-primary');

                // 기차여행 카드 업데이트
                const container = document.getElementById('top-train-travels');
                container.innerHTML = '';

                data.forEach(train => {
                    container.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <img src="${train.thumbnail}" class="card-img-top" alt="기차여행 이미지" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title">${train.name}</h5>
                                <p class="card-text">
                                    <small class="text-muted">
                                        ${train.regionName}, ${train.countryName}
                                    </small>
                                </p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="text-danger">♥</span>
                                        <span>${train.likeCount}</span>
                                    </div>
                                    <a href="/trainDetail/${train.id}" class="btn btn-sm btn-outline-primary">자세히 보기</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                });
            });
    }
</script>
</body>
</html>
