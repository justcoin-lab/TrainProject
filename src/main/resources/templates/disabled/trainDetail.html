<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title th:text="${trainTravel.name} + ' - 이색기차여행'">기차여행 상세</title>
</head>
<body>
<div layout:fragment="content">
    <div class="train-detail">
        <!-- 기차여행 이미지 -->
        <div class="train-images mb-4">
            <img th:src="${trainTravel.thumbnail}" class="img-fluid rounded" alt="기차여행 이미지" style="max-height: 400px; width: 100%; object-fit: cover;">
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 th:text="${trainTravel.name}">기차여행 이름</h1>

            <div class="actions">
                <!-- 북마크 버튼 -->
                <button sec:authorize="isAuthenticated()"
                        th:class="${trainTravel.bookmarked ? 'btn btn-primary' : 'btn btn-outline-primary'}"
                        onclick="toggleBookmark()"
                        id="bookmark-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bookmark-fill" viewBox="0 0 16 16">
                        <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.101l-5.223 2.815A.5.5 0 0 1 2 15.5V2z"/>
                    </svg>
                    북마크
                </button>

                <!-- 로그인 필요 메시지 -->
                <div sec:authorize="isAnonymous()">
                    <a href="/login" class="btn btn-sm btn-outline-secondary">로그인하여 추천 및 북마크 하기</a>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <!-- 기차여행 정보 -->
                <div class="train-info mb-4">
                    <div class="mb-2">
                        <span class="badge bg-primary me-2" th:text="${trainTravel.countryName}">국가명</span>
                        <span class="badge bg-secondary" th:text="${trainTravel.regionName}">지역명</span>
                    </div>

                    <div class="train-description mb-4">
                        <h4 class="mb-3">기차여행 소개</h4>
                        <p th:text="${trainTravel.description}" class="lh-lg">기차여행 설명</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <!-- 기차여행 루트 이미지 -->
                <div class="train-route mb-4">
                    <h4 class="mb-3">기차여행 루트</h4>
                    <img th:src="${trainTravel.routeImage}" class="img-fluid rounded" alt="기차여행 루트">
                </div>

                <!-- 예약 링크 -->
                <div class="reservation mb-4">
                    <h4 class="mb-3">예약하기</h4>
                    <a th:href="${trainTravel.reservationLink}" target="_blank" class="btn btn-success w-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right me-2" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/>
                            <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/>
                        </svg>
                        예약사이트로 이동
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const trainTravelId = [[${trainTravel.id}]];

    function toggleLike() {
        fetch(`/api/trainTravels/${trainTravelId}/like`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            const likeButton = document.getElementById('like-button');
            const likeCount = document.getElementById('like-count');

            if (data.liked) {
                likeButton.classList.remove('btn-outline-danger');
                likeButton.classList.add('btn-danger');
            } else {
                likeButton.classList.remove('btn-danger');
                likeButton.classList.add('btn-outline-danger');
            }

            likeCount.textContent = data.likeCount;
        });
    }

    function toggleBookmark() {
        fetch(`/api/trainTravels/${trainTravelId}/bookmark`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            const bookmarkButton = document.getElementById('bookmark-button');

            if (data.bookmarked) {
                bookmarkButton.classList.remove('btn-outline-primary');
                bookmarkButton.classList.add('btn-primary');
            } else {
                bookmarkButton.classList.remove('btn-primary');
                bookmarkButton.classList.add('btn-outline-primary');
            }
        });
    }
</script>
</body>
</html>
