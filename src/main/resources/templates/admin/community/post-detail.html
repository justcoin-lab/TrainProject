<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"><title>게시글 상세</title></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container mt-5 pt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-text me-2"></i>게시글 상세</h2>
        <div>
            <a th:href="@{/admin/community/posts}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-1"></i> 목록으로
            </a>
        </div>
    </div>
    
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="m-0" th:text="${post.title}">게시글 제목</h5>
            <span>
                <i class="bi bi-person me-1"></i> <span th:text="${post.writer}">작성자</span>
            </span>
        </div>
        <div class="card-body">
            <div class="mb-4 p-3 bg-light rounded">
                <div class="row">
                    <div class="col-md-6">
                        <small class="text-muted">
                            <i class="bi bi-calendar3 me-1"></i> 작성일: 
                            <span th:text="${#temporals.format(post.createdDate, 'yyyy-MM-dd HH:mm')}">작성일</span>
                        </small>
                    </div>
                    <div class="col-md-6 text-end">
                        <small class="text-muted" th:if="${post.modifiedDate != null}">
                            <i class="bi bi-pencil me-1"></i> 수정일: 
                            <span th:text="${#temporals.format(post.modifiedDate, 'yyyy-MM-dd HH:mm')}">수정일</span>
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="p-3 mb-4 border rounded" style="min-height: 300px;">
                <p class="mb-0" th:utext="${post.content}">게시글 내용</p>
            </div>
            
            <div class="d-flex justify-content-between mt-4">
                <a th:href="@{/admin/community/posts}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> 목록으로
                </a>
                <form th:action="@{/admin/community/posts/delete/{id}(id=${post.id})}" 
                      method="post" onsubmit="return confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i> 삭제
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- 스크립트 삽입 -->
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
