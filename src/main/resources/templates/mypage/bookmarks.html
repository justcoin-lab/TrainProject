<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/header :: head">
    <title>북마크 관리</title>
</head>

<body>
<header th:replace="fragments/header :: header"></header>

<div class="container my-5 pt-5">
    <!-- 페이지 제목 -->
    <div class="row mb-4 mt-5">
        <div class="col-12">
            <h1 class="display-5 fw-bold mb-3">북마크 관리</h1>
            <p class="lead text-muted">관심있는 기차여행 목록을 편리하게 관리하세요.</p>
        </div>
    </div>

    <!-- 알림 메시지 -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">성공 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div class="row g-4">
        <!-- 왼쪽 메뉴 -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>내 계정</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/mypage}" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2 me-2"></i>대시보드
                    </a>
                    <a th:href="@{/mypage/profile}" class="list-group-item list-group-item-action">
                        <i class="bi bi-person me-2"></i>프로필 관리
                    </a>
                    <a th:href="@{/mypage/password}" class="list-group-item list-group-item-action">
                        <i class="bi bi-key me-2"></i>비밀번호 변경
                    </a>
                    <a th:href="@{/mypage/bookmarks}" class="list-group-item list-group-item-action active">
                        <i class="bi bi-bookmark-heart me-2"></i>북마크 관리
                    </a>
                    <a th:href="@{/mypage/posts}" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-text me-2"></i>내가 쓴 글
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 오른쪽 컨텐츠 -->
        <div class="col-md-9">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-bookmark-heart me-2"></i>내 북마크 목록</h5>
                </div>
                <div class="card-body">
                    <!-- 북마크가 없는 경우 -->
                    <div th:if="${bookmarks.empty}" class="alert alert-light mb-0">
                        <i class="bi bi-info-circle me-2"></i> 북마크한 기차여행이 없습니다.
                        <a th:href="@{/}" class="alert-link">기차여행 구경하러 가기</a>
                    </div>
                    
                    <!-- 북마크 목록 -->
                    <div class="row row-cols-1 row-cols-md-3 g-4" th:unless="${bookmarks.empty}">
                        <div class="col" th:each="bookmark : ${bookmarks}">
                            <div class="card h-100 shadow-sm hover-card">
                                <img th:src="${bookmark.trainImageUrl}" class="card-img-top" alt="기차여행 이미지"
                                     style="height: 180px; object-fit: cover;">
                                <div class="card-body p-3">
                                    <h5 class="card-title" th:text="${bookmark.trainName}">기차여행 이름</h5>
                                    <div class="d-flex justify-content-between mt-3">
                                        <a th:href="@{'/trains/' + ${bookmark.trainId}}" class="btn btn-sm btn-primary">
                                            <i class="bi bi-eye me-1"></i>상세보기
                                        </a>
                                        <button class="btn btn-sm btn-outline-danger" 
                                                th:onclick="'removeBookmark(' + ${bookmark.trainId} + ')'">
                                            <i class="bi bi-bookmark-x me-1"></i>삭제
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/footer :: scripts"></th:block>

<script>
    // 북마크 삭제 함수
    function removeBookmark(trainId) {
        if (confirm('정말 이 북마크를 삭제하시겠습니까?')) {
            fetch(`/api/bookmarks/toggle?trainId=${trainId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 페이지 새로고침
                    location.reload();
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('오류가 발생했습니다. 다시 시도해주세요.');
            });
        }
    }
</script>

<style>
    .hover-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .hover-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
</style>
</body>
</html>
