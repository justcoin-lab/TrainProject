<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>커뮤니티 - 이색기차여행</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>커뮤니티</h1>
        <div sec:authorize="isAuthenticated()">
            <a href="/posts/write" class="btn btn-primary">글 작성하기</a>
        </div>
    </div>

    <!-- 게시글 목록 -->
    <div class="posts-list">
        <table class="table table-hover">
            <thead>
            <tr>
                <th scope="col" style="width: 10%">#</th>
                <th scope="col" style="width: 50%">제목</th>
                <th scope="col" style="width: 15%">작성자</th>
                <th scope="col" style="width: 15%">작성일</th>
                <th scope="col" style="width: 10%">조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts}" th:onclick="|location.href='@{/posts/{id}(id=${post.id})}'|" style="cursor: pointer;">
                <th scope="row" th:text="${post.id}">1</th>
                <td>
                    <span th:text="${post.title}">게시글 제목</span>
                    <span class="badge bg-secondary ms-2" th:if="${post.commentCount > 0}" th:text="${post.commentCount}">2</span>
                </td>
                <td th:text="${post.author}">작성자</td>
                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2025-04-18</td>
                <td th:text="${post.viewCount}">10</td>
            </tr>
            <tr th:if="${posts.empty}">
                <td colspan="5" class="text-center">등록된 게시글이 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <!-- 페이징 -->
        <nav th:if="${!posts.empty}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${posts.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/community(page=${posts.number - 1})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="page : ${#numbers.sequence(0, posts.totalPages - 1)}"
                    th:classappend="${page == posts.number ? 'active' : ''}">
                    <a class="page-link" th:href="@{/community(page=${page})}" th:text="${page + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${posts.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/community(page=${posts.number + 1})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
