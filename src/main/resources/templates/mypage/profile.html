<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/header :: head">
    <title>프로필 관리</title>
</head>

<body>
<header th:replace="fragments/header :: header"></header>

<div class="container my-5 pt-5">
    <!-- 페이지 제목 -->
    <div class="row mb-4 mt-5">
        <div class="col-12">
            <h1 class="display-5 fw-bold mb-3">프로필 관리</h1>
            <p class="lead text-muted">개인 정보를 안전하게 관리하세요.</p>
        </div>
    </div>

    <!-- 알림 메시지 -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">성공 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div class="row g-4">
        <!-- 왼쪽 메뉴 -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>내 계정</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/mypage}" class="list-group-item list-group-item-action">
                        <i class="bi bi-speedometer2 me-2"></i>대시보드
                    </a>
                    <a th:href="@{/mypage/profile}" class="list-group-item list-group-item-action active">
                        <i class="bi bi-person me-2"></i>프로필 관리
                    </a>
                    <a th:href="@{/mypage/password}" class="list-group-item list-group-item-action">
                        <i class="bi bi-key me-2"></i>비밀번호 변경
                    </a>
                    <a th:href="@{/mypage/bookmarks}" class="list-group-item list-group-item-action">
                        <i class="bi bi-bookmark-heart me-2"></i>북마크 관리
                    </a>
                    <a th:href="@{/mypage/posts}" class="list-group-item list-group-item-action">
                        <i class="bi bi-file-earmark-text me-2"></i>내가 쓴 글
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 오른쪽 컨텐츠 -->
        <div class="col-md-9">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>내 정보 수정</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/mypage/profile}" th:object="${profileDto}" method="post">
                        <div class="row g-3">
                            <!-- 아이디(고정, 수정불가) -->
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">아이디</label>
                                <input type="text" class="form-control bg-light" id="username" th:value="${user.username}" disabled>
                                <small class="form-text text-muted">아이디는 변경할 수 없습니다.</small>
                            </div>
                            
                            <!-- 이메일(고정, 수정불가) -->
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">이메일</label>
                                <input type="email" class="form-control bg-light" id="email" th:value="${user.email}" disabled>
                                <small class="form-text text-muted">이메일은 변경할 수 없습니다.</small>
                            </div>
                            
                            <!-- 닉네임(수정가능) -->
                            <div class="col-md-6 mb-3">
                                <label for="nickname" class="form-label">닉네임</label>
                                <input type="text" class="form-control" id="nickname" th:field="*{nickname}" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">
                                    닉네임은 필수 입력값입니다.
                                </div>
                                <small class="form-text text-muted">다른 사용자에게 표시되는 이름입니다.</small>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i> 정보 저장
                            </button>
                            <a th:href="@{/mypage}" class="btn btn-outline-secondary ms-2">
                                <i class="bi bi-arrow-left me-1"></i> 돌아가기
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 추가 정보 -->
            <div class="card border-0 shadow-sm mt-4">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>보안 관리</h5>
                </div>
                <div class="card-body">
                    <p>계정의 보안을 강화하기 위해 주기적으로 비밀번호를 변경하는 것이 좋습니다.</p>
                    <a th:href="@{/mypage/password}" class="btn btn-outline-primary">
                        <i class="bi bi-key me-1"></i> 비밀번호 변경하기
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/footer :: scripts"></th:block>
</body>
</html>
