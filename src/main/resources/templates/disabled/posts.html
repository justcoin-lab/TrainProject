<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: layout">
<head>
    <title>커뮤니티 게시판</title>
</head>
<section>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>커뮤니티 자유게시판</h2>

        <!-- 로그인한 경우만 글쓰기 버튼 노출 -->
        <div th:if="${isLoggedIn}">
            <a th:href="@{/posts/new}" class="btn btn-primary">글쓰기</a>
        </div>
    </div>

    <!-- 게시글 목록 테이블 -->
    <table class="table table-hover">
        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>제목</th>
            <th>작성자</th>
            <th>등록일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}">1</td>
            <td>
                <a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">제목</a>
            </td>
            <td th:text="${post.authorName}">작성자</td>
            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2025-04-18</td>
        </tr>
        <tr th:if="${#lists.isEmpty(posts)}">
            <td colspan="4" class="text-center">게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>

</section>
</html>
