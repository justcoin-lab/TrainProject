<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"><title></title></head>

<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container mt-5 pt-5">
  <h2>게시판</h2>

  <!-- 검색 폼 -->
  <div class="row mb-3">
    <div class="col-md-9">
      <form th:action="@{/board/list}" method="get" class="d-flex">
        <select name="searchType" class="form-select me-2" style="width: 120px;">
          <option value="title" th:selected="${searchType == 'title'}">제목</option>
          <option value="content" th:selected="${searchType == 'content'}">내용</option>
          <option value="writer" th:selected="${searchType == 'writer'}">작성자</option>
        </select>
        <input type="text" name="keyword" class="form-control me-2"
               th:value="${keyword}" placeholder="검색어를 입력하세요">
        <button type="submit" class="btn btn-outline-primary">검색</button>
      </form>
    </div>
    <div class="col-md-3 text-end">
      <a th:href="@{/board/list}" class="btn btn-secondary me-2">목록</a>
      <a th:href="@{/board/write}" class="btn btn-primary">글쓰기</a>
    </div>

  </div>

  <!-- 게시글 목록 -->
  <table class="table table-hover">
    <thead class="table-light">
    <tr>
      <th>번호</th>
      <th>제목</th>
      <th>작성자</th>
      <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boardList}">
      <td th:text="${board.id}"></td>
      <td><a th:href="@{/board/{id}(id=${board.id})}" th:text="${board.title}"></a></td>
      <td th:text="${board.writer}"></td>
      <td th:text="${#temporals.format(board.createdDate, 'yyyy.MM.dd HH:mm')}"></td>
    </tr>
    <tr th:if="${boardList.isEmpty()}">
      <td colspan="4" class="text-center">게시글이 없습니다.</td>
    </tr>
    </tbody>
  </table>



  <!-- 페이징 -->
  <nav aria-label="Page navigation" th:if="${!boardList.isEmpty()}">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${!boardList.hasPrevious()} ? 'disabled'">
        <a class="page-link" th:href="@{/board/list(page=${boardList.number - 1}, searchType=${searchType}, keyword=${keyword})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}" th:classappend="${i == boardList.number + 1} ? 'active'">
        <a class="page-link" th:href="@{/board/list(page=${i - 1}, searchType=${searchType},
                keyword=${keyword})}" th:text="${i}"></a>
      </li>
      <li class="page-item" th:classappend="${!boardList.hasNext()} ? 'disabled'">
        <a class="page-link" th:href="@{/board/list(page=${boardList.number + 1}, searchType=${searchType}, keyword=${keyword})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>
    </ul>
  </nav>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- 스크립트 삽입 -->
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>

</html>
