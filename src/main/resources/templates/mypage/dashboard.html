<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/header :: head">
    <title>마이페이지</title>
</head>

<body>
<header th:replace="fragments/header :: header"></header>

<div class="container my-5 pt-5">
    <!-- 페이지 제목 -->
    <div class="row mb-4 mt-5">
        <div class="col-12">
            <h1 class="display-5 fw-bold mb-3">마이페이지</h1>
            <p class="lead text-muted">안녕하세요, <span th:text="${user.nickname}">사용자</span>님! 개인 정보 관리 및 활동 내역을 확인하세요.</p>
        </div>
    </div>

    <!-- 알림 메시지 -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">성공 메시지</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div class="row g-4">
        <!-- 왼쪽 메뉴 -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>내 계정</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/mypage}" class="list-group-item list-group-item-action active">
                        <i class="bi bi-speedometer2 me-2"></i>대시보드
                    </a>
                    <a th:href="@{/mypage/profile}" class="list-group-item list-group-item-action">
                        <i class="bi bi-person me-2"></i>프로필 관리
                    </a>
                    <a th:href="@{/mypage/password}" class="list-group-item list-group-item-action">
                        <i class="bi bi-key me-2"></i>비밀번호 변경
                    </a>
                    <a th:href="@{/mypage/bookmarks}" class="list-group-item list-group-item-action">
                        <i class="bi bi-bookmark-heart me-2"></i>북마크 관리
                    </a>
                </div>
            </div>
        </div>
        
        <!-- 오른쪽 컨텐츠 -->
        <div class="col-md-9">
            <!-- 프로필 개요 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>내 프로필</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 text-center mb-4 mb-md-0">
                            <i class="bi bi-person-circle" style="font-size: 6rem; color: #6c757d;"></i>
                        </div>
                        <div class="col-md-8">
                            <h4 th:text="${user.nickname}">사용자명</h4>
                            <p class="text-muted" th:text="${user.email}">이메일</p>
                            <p>
                                <span class="badge bg-primary" th:if="${user.role.name() == 'USER'}">일반 회원</span>
                                <span class="badge bg-danger" th:if="${user.role.name() == 'ADMIN'}">관리자</span>
                            </p>
                            <a th:href="@{/mypage/profile}" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-pencil-square me-1"></i>프로필 수정
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 북마크 개요 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-bookmark-heart me-2"></i>내 북마크</h5>
                    <a th:href="@{/mypage/bookmarks}" class="btn btn-sm btn-outline-primary">
                        전체보기
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${bookmarks.empty}" class="alert alert-light mb-0">
                        <i class="bi bi-info-circle me-2"></i> 북마크한 기차여행이 없습니다.
                    </div>
                    
                    <div class="row row-cols-1 row-cols-md-3 g-3" th:unless="${bookmarks.empty}">
                        <div class="col" th:each="bookmark, iterStat : ${bookmarks}" th:if="${iterStat.index < 3}">
                            <div class="card h-100 shadow-sm hover-card">
                                <img th:src="${bookmark.trainImageUrl}" class="card-img-top" alt="기차여행 이미지"
                                     style="height: 140px; object-fit: cover;">
                                <div class="card-body p-3">
                                    <h6 class="card-title" th:text="${bookmark.trainName}">기차여행 이름</h6>
                                    <a th:href="@{'/trains/' + ${bookmark.trainId}}" class="btn btn-sm btn-primary w-100 mt-2">
                                        <i class="bi bi-eye me-1"></i>상세보기
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/footer :: scripts"></th:block>

<style>
    .hover-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .hover-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
</style>
</body>
</html>
